---
  definitions:
    project: human
    python: python
    fasta: $base/fasta
    base: $project
    ct: $base/ct
    xios: ../data
    RNAstructure: ../RNAstructure
  stage:
    xios:
      command: $python $xios/xios_from_rnastructure.py $option $in $out $another
      option:
        -c $fasta 
        -x $ct 
        -r $RNAstructure
      in: $xios/*.xios
      out: $ct/%in.replace('.xios', '.ct')
      another: ./%in.replace('.xios', '.fasta')
    two:
      command: $python $xios/xios_dummy.py $option
      option:
        -h