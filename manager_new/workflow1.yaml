---
  definitions:
    project: testproject
    python: python
    source: ../data
    base: $project
    ct: $base/ct
    xios: ../RNA
    RNAstructure: ../RNAstructure
  stage:
    xios:
      command: $python $xios/xios_from_rnastructure.py $option $in $out $another
      option:
        -c $fasta 
        -x $ct 
        -r $RNAstructure
      in: $source/*.xios
      out: :$xios/%in.replace('.xios', '.ct')
      another: :$ct/%in.replace('.xios', '.fasta')
    two:
      command: $python $xios/xios_dummy.py $option
      option:
        -h