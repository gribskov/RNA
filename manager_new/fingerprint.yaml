# workflow for calculating fingerprints from sequence using partition function
---
  definitions:
#   code locations
    python: python
    base: /scratch/scholar/mgribsko
    xiosexe: $base/RNA
    RNAstructure: $base/RNAstructure/exe
    fasta: $base/standards/fasta_fixed
    project: $base/testmanager
    partition: $project/partition
    stochastic: $project/stochastic
    xios: $project/xios
  stage:
    start:
      command: ls; export DATAPATH=$base/RNAstructure/data_tables
    partition:
      command: $RNAstructure/partition  $in $out $option
      option:
        -t 280 
        -q
      in: $fasta/rnasep*.fa
      out: :$partition/%in.replace('.fa', '.pfs')
    stochastic:
      command: $RNAstructure/stochastic $in $out $option
      option: -s 3
      in: $partition/*.pfs
      out: :$stochastic/%in.replace('.pfs', '.ct')
    xios:
      command: $python $xiosexe/stochastic_to_xios.py $option $in $out
      option: -m 3 -c 50
      in: $stochastic/*.ct
      out: :$xios/%in.replace('.ct', '.xios')

